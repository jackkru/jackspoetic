<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - Jack's Poetic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dark-mode.css">
    <link rel="stylesheet" href="/static/css/subscription.css">
    <script>
        // Prevent flash of incorrect theme - run immediately
        (function() {
            try {
                const theme = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', theme);
                // Also set a class for immediate styling
                document.documentElement.classList.add('theme-' + theme);
            } catch (e) {
                // Fallback to light theme if localStorage fails
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.classList.add('theme-light');
            }
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-padding-top: 100px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
        }
        
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.5rem 2rem;
            background: var(--bg-nav);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-nav);
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        
        .nav-links a {
            color: var(--text-nav);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }
        
        .nav-links a:hover {
            color: var(--link-hover);
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--link-hover);
            transition: width 0.3s ease;
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 2rem 4rem 2rem;
        }
        
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 1rem 0;
        }
        
        .header h1 {
            color: var(--text-primary);
            margin: 0 0 1rem 0;
            font-size: 3rem;
            font-weight: 300;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }
        
        .post-meta {
            color: var(--link-hover);
            font-size: 1rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 500;
        }
        
        .post-content {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 3rem;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-primary);
            box-shadow: 0 10px 30px var(--shadow-color);
        }
        
        /* Remove excessive spacing from post content */
        .post-content > *:first-child {
            margin-top: 0;
        }
        
        .post-content h1, .post-content h2, .post-content h3 {
            color: var(--text-primary);
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        
        .post-content h1 { 
            font-size: 2.2rem; 
            border-bottom: 2px solid var(--link-hover);
            padding-bottom: 0.5rem;
        }
        
        /* Hide duplicate title if it's the first element */
        .post-content > h1:first-child {
            display: none;
        }
        
        .post-content h2 { 
            font-size: 1.8rem; 
            color: var(--link-hover);
        }
        
        .post-content h3 { 
            font-size: 1.4rem; 
        }
        
        .post-content p {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .post-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 2rem auto;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .post-content blockquote {
            border-left: 4px solid var(--link-hover);
            margin: 2rem 0;
            padding: 1.5rem 2rem;
            background: var(--bg-secondary);
            font-style: italic;
            font-size: 1.1rem;
            border-radius: 0 12px 12px 0;
            color: var(--text-secondary);
        }
        
        .post-content code {
            background: var(--code-bg);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', 'Courier New', monospace;
            color: var(--code-color);
            font-size: 0.9rem;
        }
        
        .post-content pre {
            background: var(--pre-bg);
            color: var(--pre-color);
            padding: 1.5rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 2rem 0;
            box-shadow: 0 4px 15px var(--shadow-color);
        }
        
        .post-content pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        
        .post-content ul, .post-content ol {
            margin: 1.5rem 0;
            padding-left: 2rem;
        }
        
        .post-content li {
            margin-bottom: 0.5rem;
        }
        
        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px var(--shadow-color);
        }
        
        .post-content table thead {
            background: var(--bg-primary);
        }
        
        .post-content table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-color);
        }
        
        .post-content table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .post-content table tbody tr:last-child td {
            border-bottom: none;
        }
        
        .post-content table tbody tr:hover {
            background: var(--bg-primary);
        }
        
        .post-content .footnote {
            vertical-align: super;
            font-size: 0.8em;
            color: var(--link-hover);
            text-decoration: none;
        }
        
        .post-content .footnote:hover {
            text-decoration: underline;
        }
        
        .post-content .footnotes {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }
        
        .post-content .footnotes ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }
        
        .post-content .footnotes li {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }
        
        .post-content .footnotes li p {
            margin-bottom: 0.5rem;
        }
        
        .post-content .footnotes a {
            color: var(--link-hover);
            text-decoration: none;
        }
        
        .post-content .footnotes a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            margin-top: 3rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.75rem 1.5rem;
            border: 2px solid #667eea;
            border-radius: 50px;
            transition: all 0.3s ease;
            background: transparent;
        }
        
        .back-link:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .back-link::before {
            content: '←';
            margin-right: 0.5rem;
            transition: transform 0.3s ease;
        }
        
        .back-link:hover::before {
            transform: translateX(-3px);
        }
        
        .comments-section {
            margin-top: 3rem;
            padding: 2rem;
            background: var(--bg-primary);
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .comments-section h3 {
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .comment-form input,
        .comment-form textarea {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .comment-form input:focus,
        .comment-form textarea:focus {
            outline: none;
            border-color: var(--link-hover);
        }

        .comment-form textarea {
            min-height: 100px;
            resize: vertical;
        }

        .comment-form button {
            align-self: flex-start;
            padding: 0.75rem 1.5rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .comment-form button:hover {
            background: #5a6fd6;
            transform: translateY(-1px);
        }

        .comment-form button:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        .comment-form .hp { display: none; }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .comment {
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            border-left: 3px solid var(--link-hover);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .comment-author {
            font-weight: 600;
            color: var(--text-primary);
        }

        .comment-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .comment-content {
            color: var(--text-primary);
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .no-comments {
            color: var(--text-secondary);
            font-style: italic;
        }

        .footer {
            background: var(--footer-bg);
            color: var(--footer-text);
            text-align: center;
            padding: 3rem 2rem;
            margin-top: 6rem;
        }
        
        .footer-text {
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .nav {
                padding: 1rem;
            }
            
            .nav-links {
                gap: 1rem;
            }
            
            .container {
                padding: 100px 1rem 2rem 1rem;
            }
            
            .header h1 {
                font-size: 2.2rem;
            }
            
            .post-content {
                padding: 2rem 1.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <a href="/" class="nav-logo">jackspoetic</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/blog">Blog</a>
                <button class="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z"/>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5">
                        <path d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="header">
            <h1>{{ post.title }}</h1>
        </div>
        
        <div class="post-meta">
            {{ post.date }} • By {{ post.author }}
        </div>
        
        <article class="post-content">
            {{ post.content | safe }}
        </article>
        
        <div style="text-align: center;">
            <a href="/blog" class="back-link">Back to Blog</a>
        </div>

        <!-- Comments Section -->
        <div class="comments-section">
            <h3>Comments</h3>
            <form class="comment-form" id="comment-form">
                <input type="text" name="name" placeholder="Your name" required maxlength="100">
                <input type="text" name="website" class="hp" tabindex="-1" autocomplete="off">
                <textarea name="content" placeholder="Write a comment..." required maxlength="5000"></textarea>
                <button type="submit">Post Comment</button>
            </form>
            <div class="comments-list" id="comments-list">
                <p class="no-comments">Loading comments...</p>
            </div>
        </div>

        <div class="subscription-form-container">
            <h3>Subscribe for Updates</h3>
            <p>Get notified when I publish new writing.</p>
            <form class="subscription-form">
                <input type="email" name="email" placeholder="your@email.com" required>
                <button type="submit">Subscribe</button>
            </form>
            <div class="subscription-message"></div>
        </div>
    </div>

    <footer class="footer">
        <p class="footer-text">
            © 2024 jackspoetic. Last updated: <span id="timestamp"></span>
        </p>
    </footer>
    
    <script src="/static/js/dark-mode.js"></script>
    <script src="/static/js/subscription.js"></script>
    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString();

        const POST_SLUG = '{{ post.slug }}';
        const commentsList = document.getElementById('comments-list');
        const commentForm = document.getElementById('comment-form');

        function renderComments(comments) {
            if (comments.length === 0) {
                commentsList.innerHTML = '<p class="no-comments">No comments yet. Be the first!</p>';
                return;
            }
            commentsList.innerHTML = comments.map(c => `
                <div class="comment">
                    <div class="comment-header">
                        <span class="comment-author">${escapeHtml(c.author)}</span>
                        <span class="comment-date">${c.date}</span>
                    </div>
                    <div class="comment-content">${escapeHtml(c.content)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadComments() {
            try {
                const res = await fetch(`/api/comments/${POST_SLUG}`);
                const data = await res.json();
                renderComments(data.comments || []);
            } catch (e) {
                commentsList.innerHTML = '<p class="no-comments">Could not load comments.</p>';
            }
        }

        commentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = commentForm.querySelector('button');
            const name = commentForm.querySelector('input[name="name"]').value.trim();
            const content = commentForm.querySelector('textarea[name="content"]').value.trim();
            const website = commentForm.querySelector('input[name="website"]').value;

            btn.disabled = true;
            btn.textContent = 'Posting...';

            try {
                const res = await fetch('/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slug: POST_SLUG, name, content, website })
                });
                const data = await res.json();
                if (data.success && data.comment) {
                    const comments = [...commentsList.querySelectorAll('.comment')].length;
                    if (comments === 0) commentsList.innerHTML = '';
                    commentsList.innerHTML += `
                        <div class="comment">
                            <div class="comment-header">
                                <span class="comment-author">${escapeHtml(data.comment.author)}</span>
                                <span class="comment-date">${data.comment.date}</span>
                            </div>
                            <div class="comment-content">${escapeHtml(data.comment.content)}</div>
                        </div>
                    `;
                    commentForm.reset();
                } else {
                    alert(data.message || 'Could not post comment.');
                }
            } catch (e) {
                alert('Could not post comment. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Post Comment';
            }
        });

        loadComments();
    </script>
</body>
</html>
